[package]
name = "heatcli"
edition.workspace = true
version.workspace = true
readme.workspace = true
license.workspace = true

[dependencies]
tracel = { path = "../../crates/tracel", version = "0.1.0", features = ["heat-sdk-cli"] }
clap = { version = "4.5", features = ["string", "derive"] }
shlex = "1.3.0"
rustyline = { version = "15.0.0", features = ["custom-bindings", "derive"] }
anyhow = "1.0"
colored = "3.0.0"
serde = "1.0.217"
ipc-channel = "0.19.0"
notify = "7.0.0"
notify-debouncer-mini = "0.5.0"
self-replace = "1.5.0"
uuid = "1.11.0"
cargo-util = "0.2.16"
cargo_metadata = "0.19.1"
indicatif = "0.17.9"
crossbeam-channel = "0.5.14"
notify-types = "1.0.1"
ctrlc = "3.4.5"
serde_json = "1.0.134"
regex = "1.11.1"
strum = { version = "0.26.3", features = ["derive"] }

